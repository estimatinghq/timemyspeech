<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speech Timer | Time My Speech</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(180deg,#eef4ff 0%,#f8fbff 100%);
color:#111827;
}

/* HEADER */

.top-header{
background:white;
border-bottom:1px solid #e5e7eb;
padding:18px 24px;
}

.header-inner{
max-width:1450px;
margin:auto;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
font-size:20px;
font-weight:800;
}

.tagline{
font-size:14px;
color:#6b7280;
}

/* HERO TITLE */

.hero{
text-align:center;
padding:40px 20px 30px 20px;
}

.hero h1{
margin:0;
font-size:40px;
font-weight:800;
}

.hero p{
margin-top:10px;
font-size:18px;
color:#6b7280;
}

/* MAIN TOOL */

.wrapper{
max-width:1450px;
margin:auto;
}

.card{
background:white;
overflow:hidden;
min-height:92vh;
}

.tool{
display:grid;
grid-template-columns:1fr 1fr 1fr;
align-items:start;
min-height:92vh;
}

.left,.middle,.right{
padding:18px;
min-height:92vh;
}

.left,.middle{
border-right:1px solid #dfe5ef;
}

.section-title{
font-size:16px;
font-weight:700;
margin-bottom:14px;
}

textarea{
width:100%;
min-height:410px;
border:1px solid #cfcfcf;
border-radius:18px;
padding:14px;
font-size:15px;
resize:vertical;
outline:none;
font-family:Arial;
}

.word-count{
margin-top:10px;
font-size:14px;
color:#666;
}

/* CONTROLS */

.controls{
display:grid;
gap:12px;
}

.control-group label{
display:block;
font-size:14px;
margin-bottom:8px;
}

.preset-row{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.preset-btn{
border:1px solid #d1d5db;
background:#f8f8f8;
padding:8px 16px;
border-radius:14px;
font-weight:700;
cursor:pointer;
}

.preset-btn.active{
background:#eef4ff;
border-color:#2563eb;
color:#2563eb;
}

select,input{
width:100%;
padding:10px 14px;
border-radius:14px;
border:1px solid #d1d5db;
font-size:15px;
}

/* BUTTONS */

.button-row{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

button{
border:none;
padding:12px;
border-radius:16px;
font-weight:700;
cursor:pointer;
}

.primary-btn{
background:#2563eb;
color:white;
}

.secondary-btn{
background:#f8f8f8;
border:1px solid #d1d5db;
}

.purple-btn{
background:linear-gradient(90deg,#7c3aed,#9333ea);
color:white;
}

.full-btn{
grid-column:1/-1;
}

/* RESULT BOX */

.result-box{
margin-top:14px;
background:#eef2f7;
padding:18px;
width:430px;
max-width:100%;
}

.result-label{
font-size:12px;
font-weight:700;
letter-spacing:2px;
color:#6b7280;
text-transform:uppercase;
}

.time-result{
font-size:34px;
font-weight:800;
margin-top:6px;
color:#c81e1e;
}

.status{
font-size:18px;
font-weight:700;
margin-top:8px;
color:#c81e1e;
}

.advice{
font-size:16px;
margin-top:6px;
color:#4b5563;
}

@media(max-width:1100px){

.tool{
grid-template-columns:1fr;
}

.left,.middle{
border-right:none;
border-bottom:1px solid #dfe5ef;
}

textarea{
min-height:260px;
}

}

</style>
</head>

<body>

<header class="top-header">
<div class="header-inner">
<div class="logo">TimeMySpeech</div>
<div class="tagline">Speech timer and word count tool</div>
</div>
</header>

<section class="hero">
<h1>Speech Timer</h1>
<p>Paste your speech and check your speaking time instantly</p>
</section>

<div class="wrapper">
<div class="card">
<div class="tool">

<div class="left">

<div class="section-title">Original speech</div>

<textarea id="speechText"></textarea>

<div class="word-count">Word count: <span id="wordCount">0</span></div>

<div class="result-box">
<div class="result-label">Estimated Time</div>
<div class="time-result">Your result will appear here</div>
<div class="status"></div>
<div class="advice"></div>
</div>

</div>

<div class="middle">

<div class="section-title">Check your timing</div>

<div class="controls">

<div class="control-group">
<label>Quick target</label>
<div class="preset-row">
<button class="preset-btn" data-minutes="1">1 min</button>
<button class="preset-btn active" data-minutes="2">2 min</button>
<button class="preset-btn" data-minutes="3">3 min</button>
<button class="preset-btn" data-minutes="4">4 min</button>
<button class="preset-btn" data-minutes="5">5 min</button>
</div>
</div>

<div class="control-group">
<label>Speaking speed</label>
<select id="speed">
<option value="110">Slow</option>
<option value="130" selected>Normal</option>
<option value="150">Fast</option>
</select>
</div>

<div class="control-group">
<label>Target minutes</label>
<input type="number" id="targetMinutes" value="2">
</div>

<div class="button-row">
<button class="primary-btn" onclick="calculateTime()">Check Speech Time</button>
<button class="secondary-btn" onclick="trimToTarget()">Trim to Target</button>
<button class="purple-btn full-btn">Refine with AI</button>
<button class="secondary-btn" onclick="useRefinedText()">Use Refined</button>
<button class="secondary-btn" onclick="clearSpeech()">Clear</button>
</div>

</div>

</div>

<div class="right">

<div class="section-title">Refined speech</div>

<textarea id="refinedText"></textarea>

<div class="word-count">Word count: <span id="refinedWordCount">0</span></div>

</div>

</div>
</div>
</div>

<script>

const speechText=document.getElementById("speechText")
const refinedText=document.getElementById("refinedText")
const wordCount=document.getElementById("wordCount")
const refinedWordCount=document.getElementById("refinedWordCount")

function countWords(text){
const cleaned=text.trim()
return cleaned===""?0:cleaned.split(/\s+/).length
}

speechText.addEventListener("input",()=>{

wordCount.textContent=countWords(speechText.value)

})

refinedText.addEventListener("input",()=>{

refinedWordCount.textContent=countWords(refinedText.value)

})

function calculateTime(){

const words=countWords(speechText.value)

if(!words)return

const speed=parseInt(document.getElementById("speed").value)

const targetMinutes=parseFloat(document.getElementById("targetMinutes").value)

const seconds=Math.round(words/speed*60)

const mins=Math.floor(seconds/60)

const secs=seconds%60

const targetSeconds=targetMinutes*60

const diff=seconds-targetSeconds

let status=""
let advice=""

if(Math.abs(diff)<=10){

status="Very close to target"

}else if(diff>0){

status=`Too long by ${diff} seconds`
advice=`Remove about ${Math.round(diff/60*speed)} words`

}else{

status=`Too short by ${Math.abs(diff)} seconds`
advice=`Add about ${Math.round(Math.abs(diff)/60*speed)} words`

}

document.querySelector(".time-result").textContent=`${mins} min ${secs} sec`
document.querySelector(".status").textContent=status
document.querySelector(".advice").textContent=advice

}

function trimToTarget(){

const words=speechText.value.split(/\s+/)

const speed=parseInt(document.getElementById("speed").value)

const target=parseFloat(document.getElementById("targetMinutes").value)

const targetWords=Math.round(speed*target)

refinedText.value=words.slice(0,targetWords).join(" ")

refinedWordCount.textContent=countWords(refinedText.value)

}

function useRefinedText(){

speechText.value=refinedText.value

wordCount.textContent=countWords(speechText.value)

}

function clearSpeech(){

speechText.value=""
refinedText.value=""
wordCount.textContent=0
refinedWordCount.textContent=0

}

</script>

</body>
</html>
